name: "Configuration"
description: "Action for exporting configurations which should be used by the
  rest of the workflows and actions."
author: "The Dev Nolus Team <dev@nolus.io>"

runs:
  using: composite
  steps:
    - name: "Export configurations"
      id: "configuration"
      shell: "sh"
      env:
        # The format of the build combinations JSON is:
        # {
        #   "platform": [
        #     "<optimized build profile>",
        #     ...
        #   ],
        #   "protocol": {
        #     "<network>": {
        #       "<protocol>": "<optimized build profile>",
        #       ...
        #     },
        #     ...
        #   },
        #   "tests": {
        #     "<network>": [
        #       "<protocol>",
        #       ...
        #     ],
        #     ...
        #   }
        # }
        ########################## START OF EDIT HERE ##########################
        stable_rust_version: '1.75'
        nightly_rust_version: 'nightly-2024-02-05'
        dev_profile_without_debug_assertions: 'dev_no_debug_assertions'
        build_combinations_json: |-
          {
            "platform": [
              "test_nets_release",
              "production_nets_release"
            ],
            "protocol": {
              "net_dev": {
                "neutron-astroport-usdc_axelar": "test_nets_release",
                "osmosis-osmosis-usdc_axelar": "test_nets_release",
                "osmosis-osmosis-usdc_noble": "test_nets_release"
              },
              "net_test": {
                "neutron-astroport-usdc_axelar": "production_nets_release",
                "osmosis-osmosis-usdc_axelar": "production_nets_release",
                "osmosis-osmosis-usdc_noble": "production_nets_release"
              },
              "net_main": {
                "neutron-astroport-usdc_axelar": "production_nets_release",
                "osmosis-osmosis-usdc_axelar": "production_nets_release",
                "osmosis-osmosis-usdc_noble": "production_nets_release"
              }
            },
            "tests": {
              "net_main": [
                "neutron-astroport-usdc_axelar",
                "osmosis-osmosis-usdc_axelar",
                "osmosis-osmosis-usdc_noble"
              ]
            }
          }
        max_wasm_file_size: '8M'
        available_wasm_capabilities: "cosmwasm_1_1,cosmwasm_1_2,iterator,\
          neutron,staking,stargate"
        ########################### END OF EDIT HERE ###########################
      run: |-
        test_err() {
          if "[" "${?}" -ne 0 ]
          then
            echo "${1}"

            exit 1
          fi
        }

        build_combinations_json="$(echo "${build_combinations_json}" | jq -c)"

        test_err "Failed to compact \"build_combinations_json\"!"

        unused_deps_matrix_json="$(
          echo "${build_combinations_json}" \
            | jq -c '{
                "include": (
                  [
                    {
                      "working-directory": [
                        "platform",
                        "tools"
                      ][],
                      "network": "@agnostic",
                      "protocol": "@agnostic"
                    }
                  ] + [
                    .protocol
                      | to_entries[]
                      | {
                          "working-directory": "protocol",
                          "network": .key,
                          "protocol": (.value | to_entries[].key)
                        }
                  ]
                )
              }'
        )"

        test_err "Failed to construct \"unused_deps_matrix_json\"!"

        packages_tests_matrix_json="$(
          echo "${build_combinations_json}" \
            | jq -c --argjson unused_deps_matrix "${unused_deps_matrix_json}" '{
                "include": (
                  $unused_deps_matrix.include + [
                    .tests
                      | to_entries[]
                      | {
                          "working-directory": "tests",
                          "network": .key,
                          "protocol": .value[]
                        }
                  ]
                )
              }'
        )"

        test_err "Failed to construct \"packages_tests_matrix_json\"!"

        linting_matrix_json="$(
          echo "${packages_tests_matrix_json}" \
            | jq -c --arg dev_without_debug_assertions \
                "${dev_profile_without_debug_assertions}" \
                '{"include": [.include[] + { "profile": ["dev", $dev_without_debug_assertions][] }]}'
        )"

        test_err "Failed to construct \"linting_matrix_json\"!"

        build_optimized_matrix_json="$(
          echo "${build_combinations_json}" \
            | jq -c '{
                "include": (
                  [
                    {
                      "working-directory": "platform",
                      "network": "@agnostic",
                      "protocol": "@agnostic",
                      "profile": .platform[]
                    }
                  ] + [
                    .protocol
                      | to_entries[]
                      | (
                          { "working-directory": "protocol", "network": .key }
                            + [
                              .value
                                | to_entries[]
                                | { "protocol": .key, "profile": .value }
                            ][]
                        )
                  ]
                )
              }'
        )"

        test_err "Failed to construct \"build_optimized_matrix_json\"!"

        echo "stable-rust-version<<EOF
        ${stable_rust_version}
        EOF
        nightly-rust-version<<EOF
        ${nightly_rust_version}
        EOF
        linting-matrix-json<<EOF
        ${linting_matrix_json}
        EOF
        unused-deps-matrix-json<<EOF
        ${unused_deps_matrix_json}
        EOF
        packages-tests-matrix-json<<EOF
        ${packages_tests_matrix_json}
        EOF
        build-optimized-matrix-json<<EOF
        ${build_optimized_matrix_json}
        EOF
        max-wasm-file-size<<EOF
        ${max_wasm_file_size}
        EOF
        available-wasm-capabilities<<EOF
        ${available_wasm_capabilities}
        EOF" >> "${GITHUB_OUTPUT}"

outputs:
  stable-rust-version:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.stable-rust-version }}
  nightly-rust-version:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.nightly-rust-version }}
  linting-matrix-json:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.linting-matrix-json }}
  unused-deps-matrix-json:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.unused-deps-matrix-json }}
  packages-tests-matrix-json:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.packages-tests-matrix-json }}
  build-optimized-matrix-json:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.build-optimized-matrix-json }}
  max-wasm-file-size:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.max-wasm-file-size }}
  available-wasm-capabilities:
    description: ''
    value: |-
      ${{ steps.configuration.outputs.available-wasm-capabilities }}
