name: "<Callable> Run checks & build"
run-name: "Running workflow for smart contracts"

on:
  workflow_dispatch:
    inputs:
      upload-artifacts:
        description: "Upload optimized builds as artifacts."
        required: true
        default: false
        type: boolean
  push:
    branches:
      - "main"
    tags:
      - "*"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - "**.md"

concurrency:
  cancel-in-progress: true
  group: |-
    ${{ format(
      '{0}-{1}-{2}',
      github.ref_name,
      github.ref_type,
      github.event_name,
      inputs.upload-artifacts
    ) }}

defaults:
  run:
    shell: "sh"

env:
  CARGO_TERM_COLOR: "always"
  RELEASE_VERSION: "ci"
  UPLOAD_ARTIFACTS: |-
    ${{ toJSON(
      github.ref_type == 'tag' || (
        github.event_name == 'workflow_dispatch'
          && inputs.upload-artifacts
      )
    ) }}

jobs:
  configuration:
    runs-on: "ubuntu-latest"
    name: "Configuration"
    outputs:
      stable-rust-version: |-
        ${{ steps.configuration.outputs.stable-rust-version }}
      nightly-rust-version: |-
        ${{ steps.configuration.outputs.nightly-rust-version }}
      linting-matrix-json: |-
        ${{ steps.configuration.outputs.linting-matrix-json }}
      unused-deps-matrix-json: |-
        ${{ steps.configuration.outputs.unused-deps-matrix-json }}
      packages-tests-matrix-json: |-
        ${{ steps.configuration.outputs.packages-tests-matrix-json }}
      build-optimized-matrix-json: |-
        ${{ steps.configuration.outputs.build-optimized-matrix-json }}
      max-wasm-file-size: |-
        ${{ steps.configuration.outputs.max-wasm-file-size }}
      available-wasm-capabilities: |-
        ${{ steps.configuration.outputs.available-wasm-capabilities }}
    steps:
      - uses: "actions/checkout@v4"
      - id: "configuration"
        uses: "./.github/actions/configuration"
      - shell: "sh"
        run: "exit"
        env:
          configuration: |-
            ${{ toJSON(steps.configuration.outputs) }}
  install_crates-io_tooling:
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: true
      matrix:
        tool:
          # Add necessary tooling
          - "cargo-audit"
          - "cargo-udeps"
          - "cosmwasm-check"
    ### GitHub Actions escaped string
    name: "Install tool [${{ matrix.tool }}; local: false]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/install-tool"
        with:
          no-fetching: "true"
          fail-on-cache-miss: "false"
          tool: |-
            ${{ matrix.tool }}
          local: "false"
  cache_rust_toolchains:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
    name: "Cache Rust toolchains"
    steps:
      - uses: "actions/checkout@v4"
      - id: "restore-cache"
        uses: "./.github/actions/cache-rust"
        with:
          cache-cargo: "false"
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "true"
          rust-nightly: |-
            ${{ needs.configuration.outputs.nightly-rust-version }}
          no-fetching: "true"
          fail-on-cache-miss: "false"
  cache_cargo_and_vendor_deps:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
    strategy:
      fail-fast: true
      matrix:
        working-directory:
          - "platform"
          - "protocol"
          - "tests"
          - "tools"
    ### GitHub Actions escaped string
    name: "Cache Cargo and vendor dependencies [${{ matrix.working-directory }}\
      ]"
    steps:
      - uses: "actions/checkout@v4"
      - id: "restore-cache"
        uses: "./.github/actions/cache-rust"
        with:
          cache-cargo: "true"
          working-directory: |-
            ${{ matrix.working-directory }}
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "false"
          no-fetching: "true"
          fail-on-cache-miss: "false"
  check_deps_versions:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
    strategy:
      fail-fast: true
      matrix:
        working-directory:
          - "platform"
          - "protocol"
          - "tests"
          - "tools"
    ### GitHub Actions escaped string
    name: "Check dependencies' versions [${{ matrix.working-directory }}]"
    steps:
      - if: |-
          env.UPLOAD_ARTIFACTS == 'true'
        uses: "actions/checkout@v4"
      - uses: "./.github/actions/cache-rust"
        if: |-
          env.UPLOAD_ARTIFACTS == 'true'
        with:
          cache-cargo: "false"
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "false"
          no-fetching: "false"
          fail-on-cache-miss: "true"
      - if: |-
          env.UPLOAD_ARTIFACTS == 'true'
        env:
          stable_rust_version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
        run: |-
          cargo "+${stable_rust_version}" update --locked
        working-directory: |-
          ${{ matrix.working-directory }}
  generate_release_version:
    runs-on: "ubuntu-latest"
    needs:
      - "check_deps_versions"
    name: "Generate release version label"
    env:
      ref_name: |-
        ${{ github.ref_name }}
    outputs:
      release-version: |-
        ${{ steps.release-version.outputs.release-version }}
    steps:
      - id: "release-version"
        run: |-
          if test "${UPLOAD_ARTIFACTS}" = 'true'
          then
            release_version="${ref_name}-$(date -Iminute)"

            echo "Release version: ${release_version}" \
              >> "${GITHUB_STEP_SUMMARY}"
          else
            release_version="${RELEASE_VERSION}"
          fi

          echo "release-version=${release_version}" >> "${GITHUB_OUTPUT}"
  audit_dependencies:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
      - "check_deps_versions"
      - "install_crates-io_tooling"
    strategy:
      fail-fast: true
      matrix:
        working-directory:
          - "platform"
          - "protocol"
          - "tests"
          - "tools"
    ### GitHub Actions escaped string
    name: "Audit dependencies [${{ matrix.working-directory }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/cache-rust"
        with:
          cache-cargo: "false"
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "false"
          no-fetching: "false"
          fail-on-cache-miss: "true"
      - uses: "./.github/actions/install-tool"
        with:
          no-fetching: "false"
          fail-on-cache-miss: "true"
          tool: "cargo-audit"
          local: "false"
      - env:
          stable_rust_version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
        run: |-
          cargo "+${stable_rust_version}" audit
        working-directory: |-
          ${{ matrix.working-directory }}
  check_formatting:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
    strategy:
      matrix:
        working-directory:
          - "platform"
          - "protocol"
          - "tests"
          - "tools"
    ### GitHub Actions escaped string
    name: "Check formatting [${{ matrix.working-directory }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/cache-rust"
        with:
          cache-cargo: "false"
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "false"
          no-fetching: "false"
          fail-on-cache-miss: "true"
      - env:
          stable_rust_version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
        run: |-
          cargo "+${stable_rust_version}" fmt --check
        working-directory: |-
          ${{ matrix.working-directory }}
  install_local_tooling:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
      - "cache_cargo_and_vendor_deps"
      - "check_deps_versions"
      - "check_formatting"
    strategy:
      fail-fast: true
      matrix:
        tool:
          # Add necessary tooling
          - "cargo-each"
    ### GitHub Actions escaped string
    name: "Install tool [${{ matrix.tool }}; local: true]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/cache-rust"
        with:
          cache-cargo: "true"
          working-directory: "tools"
          cache-rust-stable: "true"
          rust-stable: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          cache-rust-nightly: "false"
          no-fetching: "false"
          fail-on-cache-miss: "false"
      - uses: "./.github/actions/install-tool"
        with:
          no-fetching: "true"
          fail-on-cache-miss: "false"
          tool: |-
            ${{ matrix.tool }}
          local: "true"
          rust-version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          tools-deps-restored: "true"
  linting:
    runs-on: 'ubuntu-latest'
    needs:
      - "configuration"
      - "cache_rust_toolchains"
      - "cache_cargo_and_vendor_deps"
      - "install_crates-io_tooling"
      - "audit_dependencies"
      - "check_formatting"
      - "install_local_tooling"
    strategy:
      fail-fast: true
      ### GitHub Actions escaped string
      matrix: "${{ fromJSON(needs.configuration.outputs.linting-matrix-json) }}"
    ### GitHub Actions escaped string
    name: "Linting [${{ matrix.working-directory }}; ${{ matrix.network }};
      ${{ matrix.protocol }}; ${{ matrix.profile }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/linting"
        with:
          rust-version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          working-directory: |-
            ${{ matrix.working-directory }}
          network: |-
            ${{ matrix.network }}
          protocol: |-
            ${{ matrix.protocol }}
          profile: |-
            ${{ matrix.profile }}
  unused_deps:
    runs-on: 'ubuntu-latest'
    needs:
      - "configuration"
      - "cache_rust_toolchains"
      - "cache_cargo_and_vendor_deps"
      - "install_crates-io_tooling"
      - "audit_dependencies"
      - "check_formatting"
      - "install_local_tooling"
    strategy:
      fail-fast: false
      ### GitHub Actions escaped string
      matrix: "${{ fromJSON(
          needs.configuration.outputs.unused-deps-matrix-json
        ) }}"
    ### GitHub Actions escaped string
    name: "Check for unused dependencies [${{ matrix.working-directory }};
      ${{ matrix.network }}; ${{ matrix.protocol }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/unused-deps"
        with:
          stable-rust-version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          nightly-rust-version: |-
            ${{ needs.configuration.outputs.nightly-rust-version }}
          working-directory: |-
            ${{ matrix.working-directory }}
          network: |-
            ${{ matrix.network }}
          protocol: |-
            ${{ matrix.protocol }}
  packages_tests:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_rust_toolchains"
      - "cache_cargo_and_vendor_deps"
      - "install_crates-io_tooling"
      - "audit_dependencies"
      - "check_formatting"
      - "install_local_tooling"
    strategy:
      fail-fast: false
      ### GitHub Actions escaped string
      matrix: "${{ fromJSON(
          needs.configuration.outputs.packages-tests-matrix-json
        ) }}"
    ### GitHub Actions escaped string
    name: "Run packages' tests [${{ matrix.working-directory }};
      ${{ matrix.network }}; ${{ matrix.protocol }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/run-tests"
        with:
          rust-version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          working-directory: |-
            ${{ matrix.working-directory }}
          network: |-
            ${{ matrix.network }}
          protocol: |-
            ${{ matrix.protocol }}
  build_optimizer_image:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_cargo_and_vendor_deps"
      - "check_deps_versions"
      - "audit_dependencies"
      - "check_formatting"
    name: "Build optimizer image"
    outputs:
      container-cache-id: |-
        ${{ steps.container-cache-id.outputs.id }}
    steps:
      - uses: "actions/checkout@v4"
      - id: "container-cache-id"
        env:
          file_hashes: |-
            ${{ hashFiles(
              './Containerfile',
              './scripts/build-and-optimize.sh',
              './tools/cargo-each/**',
              './tools/Cargo.lock'
            ) }}
          stable_rust_version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
        run: |-
          printf "${file_hashes}; ${stable_rust_version}; ${UPLOAD_ARTIFACTS}" \
            | sha256sum --tag \
            | sed 's/SHA256 (-) = /id=container-/' >> "${GITHUB_OUTPUT}"
      - id: "cache-container"
        uses: "actions/cache/restore@v4"
        with:
          key: |-
            ${{ steps.container-cache-id.outputs.id }}
          path: "container.tar"
          lookup-only: "true"
      - if: |-
          steps.cache-container.outputs.cache-hit != 'true'
        env:
          stable_rust_version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
        run: |-
          docker image build . -f "Containerfile" \
            -t "localhost/wasm-optimizer" \
            --build-arg "rust_ver=${stable_rust_version}" \
            --build-arg "check_container_dependencies_updated=\
          ${UPLOAD_ARTIFACTS}"

          docker image save -o "container.tar" "localhost/wasm-optimizer"
      - if: |-
          steps.cache-container.outputs.cache-hit != 'true'
        uses: "actions/cache/save@v4"
        with:
          key: |-
            ${{ steps.container-cache-id.outputs.id }}
          path: "container.tar"
  build_and_check_optimized_protocol:
    runs-on: "ubuntu-latest"
    needs:
      - "configuration"
      - "cache_cargo_and_vendor_deps"
      - "generate_release_version"
      - "install_crates-io_tooling"
      - "check_formatting"
      - "build_optimizer_image"
    strategy:
      fail-fast: false
      ### GitHub Actions escaped string
      matrix: "${{ fromJSON(
          needs.configuration.outputs.build-optimized-matrix-json
        ) }}"
    ### GitHub Actions escaped string
    name: "Building contracts [${{ matrix.working-directory }};
      ${{ matrix.network }}; ${{ matrix.protocol }}; ${{ matrix.profile }}]"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "./.github/actions/build-and-check-optimized"
        with:
          rust-version: |-
            ${{ needs.configuration.outputs.stable-rust-version }}
          container-cache-id: |-
            ${{ needs.build_optimizer_image.outputs.container-cache-id }}
          generated-release-version: |-
            ${{ needs.generate_release_version.outputs.release-version }}
          working-directory: |-
            ${{ matrix.working-directory }}
          network: |-
            ${{ matrix.network }}
          protocol: |-
            ${{ matrix.protocol }}
          profile: |-
            ${{ matrix.profile }}
          max-wasm-file-size: |-
            ${{ needs.configuration.outputs.max-wasm-file-size }}
          available-wasm-capabilities: |-
            ${{ needs.configuration.outputs.available-wasm-capabilities }}
          upload-artifacts: |-
            ${{ env.UPLOAD_ARTIFACTS }}
