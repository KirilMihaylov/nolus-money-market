[package]
name = "currencies"
version = "0.1.0"
authors = ["The Dev Nolus Team <dev@nolus.io>"]
edition.workspace = true
license.workspace = true

[[package.metadata.cargo-each.combinations]]
groups = ["ci", "$net", "$protocol"]
sets = ["net", "protocol"]
always-on = ["$net", "$protocol"]
include-rest = true
[package.metadata.cargo-each.combinations.generics]
"$net" = "net"
"$protocol" = "protocol"

[package.metadata.cargo-each.sets.net]
members = ["net_dev", "net_test", "net_main"]
at-least-one = true
mutually-exclusive = true

[package.metadata.cargo-each.sets.protocol]
members = ["neutron-astroport-usdc_axelar", "osmosis-osmosis-usdc_axelar", "osmosis-osmosis-usdc_noble"]
at-least-one = true
mutually-exclusive = true

[lib]
doctest = false

[features]
net_dev = []
net_test = []
net_main = []

neutron-astroport-usdc_axelar = []
osmosis-osmosis-usdc_axelar = []
osmosis-osmosis-usdc_noble = []

testing = []

[dependencies]
currency = { workspace = true }
sdk = { workspace = true, features = ["schema"] }

thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
currency = { workspace = true, features = ["testing"] }
